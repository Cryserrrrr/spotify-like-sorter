<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Spotify Sorter</title>
    <script src="https://sdk.scdn.co/spotify-player.js"></script>
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <header class="header">
      <div class="logo">Spotify Sorter</div>
      <div class="progress-info">
        <span id="progress-text">Loading...</span>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>
      <div class="header-right">
        <span id="username" class="username"></span>
        <a href="/logout" class="logout-btn">Logout</a>
      </div>
    </header>

    <main class="triage-container">
      <!-- Loading -->
      <div id="loading-screen" class="loading-screen">
        <div class="spinner"></div>
        <p>Loading your liked songs...</p>
      </div>

      <!-- Empty -->
      <div id="empty-screen" class="empty-screen" style="display: none">
        <div class="empty-icon">&#10003;</div>
        <h2>All sorted!</h2>
        <p>No more liked songs to sort.</p>
      </div>

      <!-- Triage -->
      <div id="triage-view" class="triage-view" style="display: none">
        <!-- Track + Player -->
        <div class="track-section">
          <div class="track-card" id="track-card">
            <img id="album-art" class="album-art" src="" alt="Album cover" />
            <div class="track-meta">
              <h2 class="track-name" id="track-name"></h2>
              <p class="track-artist" id="track-artist"></p>
            </div>
            <div class="player-section">
              <div class="seek-row">
                <span class="time" id="time-current">0:00</span>
                <input type="range" class="seek-bar" id="seek-bar" min="0" max="100" value="0" />
                <span class="time" id="time-total">0:00</span>
              </div>
              <div class="player-buttons">
                <button class="btn-play" id="btn-play" onclick="togglePlayback()">
                  <i class="icon-play" id="play-icon"></i>
                </button>
                <div class="volume-control">
                  <img src="volume-speaker-svgrepo-com.svg" alt="Volume" class="volume-icon" />
                  <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="50" />
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Playlists -->
        <div class="playlists-section">
          <div class="playlists-header">
            <p class="section-label">Add to playlists:</p>
            <button class="btn-organize" id="btn-organize" onclick="openOrganize()">Organize</button>
          </div>
          <div class="playlist-groups" id="playlist-groups"></div>
        </div>

        <!-- Actions -->
        <div class="actions">
          <button class="btn-action btn-skip" id="btn-skip" onclick="skip()">Skip</button>
          <button class="btn-action btn-next" id="btn-next" onclick="next()">Next</button>
          <button class="btn-action btn-undo" id="btn-undo" onclick="undo()" disabled>Undo</button>
        </div>
      </div>
    </main>

    <div class="shortcuts-bar">
      <span><kbd>1</kbd>-<kbd>0</kbd> <kbd>a</kbd>-<kbd>z</kbd> playlists</span>
      <span><kbd>Space</kbd> play/pause</span>
      <span><kbd>Enter</kbd> next</span>
      <span><kbd>S</kbd> skip</span>
      <span><kbd>Z</kbd> undo</span>
    </div>

    <!-- Organize modal -->
    <div class="modal-overlay" id="organize-modal" style="display: none">
      <div class="modal">
        <div class="modal-header">
          <h2>Organize playlists</h2>
          <button class="modal-close" onclick="closeOrganize()">&times;</button>
        </div>
        <div class="modal-body">
          <div class="modal-add-group">
            <input type="text" id="new-group-name" placeholder="New group name..." class="input-group-name" />
            <button class="btn-add-group" onclick="addGroup()">+ Add</button>
          </div>
          <div class="modal-groups" id="modal-groups"></div>
          <div class="modal-ungrouped">
            <h3 class="modal-section-title">Ungrouped playlists</h3>
            <div id="modal-ungrouped-list" class="modal-playlist-list"></div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-action btn-next" onclick="closeOrganize()">Done</button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="dashboard.js"></script>
  </body>
</html>
